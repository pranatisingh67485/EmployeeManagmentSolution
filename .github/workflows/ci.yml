name: Build Employee Management Solution

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet Packages
        run: dotnet restore EmployeeManagementSolution.sln

      - name: Build Solution
        run: dotnet build EmployeeManagementSolution.sln --configuration Release --no-restore

      - name: Publish Project
        run: dotnet publish EmployeeManagementProject/EmployeeManagementProject.csproj --configuration Release --output ./publish --no-build

      - name: Upload Published Files
        uses: actions/upload-artifact@v4
        with:
          name: EmployeeManagementAPI
          path: ./publish
